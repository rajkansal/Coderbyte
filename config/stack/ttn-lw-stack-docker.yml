# Identity Server configuration
# Email configuration for "192.168.1.13"
is:
  email:
    sender-name: "The Things Stack"
    sender-address: "noreply@192.168.1.13"
    provider: "dir"
    directory:
    path: "/var/tmp/emails"
    # network:
    #   name: "The Things Stack"
    #   console-url: "https://192.168.1.13/console"
    #   identity-server-url: "https://192.168.1.13/oauth"

    # If sending email with Sendgrid
    # provider: sendgrid
    # sendgrid:
    #   api-key: '...'              # enter Sendgrid API key

    # If sending email with SMTP
    # provider: smtp
    # smtp:
    #   address:  '...'             # enter SMTP server address
    #   username: '...'             # enter SMTP server username
    #   password: '...'             # enter SMTP server password

  # Web UI configuration for "192.168.1.13":
  oauth:
    ui:
      canonical-url: "https://192.168.1.13/oauth"
      is:
        base-url: "https://192.168.1.13/api/v3"

# HTTP server configuration
http:
  cookie:
    block-key: "" # generate 32 bytes (openssl rand -hex 32)
    hash-key: "" # generate 64 bytes (openssl rand -hex 64)
  metrics:
    password: "metrics" # choose a password
  pprof:
    password: "pprof" # choose a password

# If using custom certificates:
tls:
  source: file
  root-ca: /run/secrets/ca.pem
  certificate: /run/secrets/cert.pem
  key: /run/secrets/key.pem

# Let's encrypt for "192.168.1.13"
# tls:
#   source: "acme"
#   acme:
#     dir: "/var/lib/acme"
#     email: "you@192.168.1.13"
#     hosts: ["192.168.1.13"]
#     default-host: "192.168.1.13"

# If Gateway Server enabled, defaults for "192.168.1.13":
gs:
  mqtt:
    public-address: "192.168.1.13:1882"
    public-tls-address: "192.168.1.13:8882"
  mqtt-v2:
    public-address: "192.168.1.13:1881"
    public-tls-address: "192.168.1.13:8881"

# If Gateway Configuration Server enabled, defaults for "192.168.1.13":
gcs:
  basic-station:
    default:
      lns-uri: "wss://192.168.1.13:8887"
  the-things-gateway:
    default:
      mqtt-server: "mqtts://192.168.1.13:8881"

# Web UI configuration for "192.168.1.13":
console:
  ui:
    canonical-url: "https://192.168.1.13/console"
    account-url: "https://192.168.1.13/oauth"
    is:
      base-url: "https://192.168.1.13/api/v3"
    gs:
      base-url: "https://192.168.1.13/api/v3"
    gcs:
      base-url: "https://192.168.1.13/api/v3"
    ns:
      base-url: "https://192.168.1.13/api/v3"
    as:
      base-url: "https://192.168.1.13/api/v3"
    js:
      base-url: "https://192.168.1.13/api/v3"
    qrg:
      base-url: "https://192.168.1.13/api/v3"
    edtc:
      base-url: "https://192.168.1.13/api/v3"
    dcs:
      base-url: "https://192.168.1.13/api/v3"
  oauth:
    authorize-url: "https://192.168.1.13/oauth/authorize"
    token-url: "https://192.168.1.13/oauth/token"
    logout-url: "https://192.168.1.13/oauth/logout"
    client-id: "console"
    client-secret: "console" # choose or generate a secret

# If Application Server enabled, defaults for "192.168.1.13":
as:
  mqtt:
    public-address: "192.168.1.13:1883"
    public-tls-address: "192.168.1.13:8883"
  webhooks:
    downlink:
      public-address: "192.168.1.13:1885/api/v3"

# If Device Claiming Server enabled, defaults for "192.168.1.13":
dcs:
  oauth:
    authorize-url: "https://192.168.1.13/oauth/authorize"
    token-url: "https://192.168.1.13/oauth/token"
    logout-url: "https://192.168.1.13/oauth/logout"
    client-id: "device-claiming"
    client-secret: "device-claiming" # choose or generate a secret
  ui:
    canonical-url: "https://192.168.1.13/claim"
    as:
      base-url: "https://192.168.1.13/api/v3"
    dcs:
      base-url: "https://192.168.1.13/api/v3"
    is:
      base-url: "https://192.168.1.13/api/v3"
    ns:
      base-url: "https://192.168.1.13/api/v3"